# Example Secret. DO NOT COMMIT real values.
#
# Create the real secret with:
#   kubectl create secret generic vps-mcp \
#     --from-literal=host="user@your.vps.ip" \
#     --from-file=ssh_key=$HOME/.ssh/id_ed25519
apiVersion: v1
kind: Secret
metadata:
  name: vps-mcp
type: Opaque
stringData:
  host: "user@your.vps.ip"
  ssh_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_ME
    -----END OPENSSH PRIVATE KEY-----
